<!DOCTYPE html>

<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>സാഹിത്യോത്സവ് 26 നിയമങ്ങൾ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>
<header class="topbar">
  <div class="topbar-content">
    <img src="images/sahi_logo.png" class="logo-top">
    <img src="images/sahi_eng_typo.png" class="title-top">
  </div>
</header>

<audio id="bgMusic" loop>
  <source src="audio.mp3" type="audio/mp3">
</audio>

<section id="home">
  <div class="card home-card">


<h2>സാഹിത്യോത്സവ് 2026 നിയമങ്ങൾ</h2>

<button onclick="start()">നിയമങ്ങൾ കാണുക</button>


  </div>
</section>


<section id="form" class="hidden">
  <div class="card">


<input id="name" placeholder="പേര്">

<select id="category" onchange="loadPrograms()">
  <option value="">വിഭാഗം തിരഞ്ഞെടുക്കുക</option>

  <option value="lp">ലോവർ പ്രൈമറി</option>
  <option value="lp_g">ലോവർ പ്രൈമറി (ഗേൾസ്)</option>

  <option value="up">അപ്പർ പ്രൈമറി</option>
  <option value="up_g">അപ്പർ പ്രൈമറി (ഗേൾസ്)</option>

  <option value="hs">ഹൈസ്കൂൾ</option>
  <option value="hs_g">ഹൈസ്കൂൾ (ഗേൾസ്)</option>

  <option value="hss">ഹയർ സെക്കൻഡറി</option>
  <option value="hss_g">ഹയർ സെക്കൻഡറി (ഗേൾസ്)</option>

  <option value="junior">ജൂനിയർ</option>
  <option value="senior">സീനിയർ</option>
  <option value="general">ജനറൽ</option>
</select>
<input id="search" placeholder="തിരയുക" oninput="filterPrograms()">
<div id="programList"></div>


  </div>
</section>

<section id="result" class="hidden">
  <div class="card">


<h2 id="programTitle"></h2>
<p id="time"></p>

<h3>📌 വിഷയം</h3>
<img id="topicImg">
<a id="topicDownload" class="download" download>ഡൗൺലോഡ്</a>

<h3>📜 നിയമങ്ങൾ</h3>
<img id="ruleImg">
<a id="ruleDownload" class="download" download>ഡൗൺലോഡ്</a>

<button onclick="goBack()">തിരികെ</button>


  </div>
</section>

<script src="script.js"></script>

</body>
</html>
